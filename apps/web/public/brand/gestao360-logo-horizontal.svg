<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2042"/>
      <stop offset="100%" stop-color="#081023"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="20" y1="80" x2="80" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <linearGradient id="text-360-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
  </defs>
  <!-- Icon Group scaled and placed on the left -->
  <g transform="translate(10, 10) scale(0.8)">
    <rect width="100" height="100" rx="28" fill="url(#bg-grad)"/>
    <path d="M 67.7,67.7 A 25 25 0 1 1 62.5,28.4" stroke="url(#ring-grad)" stroke-width="7" stroke-linecap="round"/>
    <polygon points="67,24 58,33 72,38" fill="#00F0FF"/>
    <circle cx="50" cy="41" r="6.5" fill="#ffffff"/>
    <path d="M 36,62 C 36,55 42,53 50,53 C 58,53 64,55 64,62 Z" fill="#ffffff"/>
  </g>
  <!-- Brand Text -->
  <text x="110" y="52" fill="#0f2042" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">Gestão <tspan fill="url(#text-360-grad)">360</tspan></text>
  <text x="112" y="74" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.3em">GESTÃO EMPRESARIAL</text>
</svg>

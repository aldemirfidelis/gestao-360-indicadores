# =====================================================
# Docker Compose para Droplet DigitalOcean (producao)
# - Postgres + API + Web + Caddy (proxy reverso com SSL automatico)
# - Banco roda LOCAL na droplet (mesmo host da API) -> latencia <1ms por query.
#   Antes era Neon (AWS us-east-2): cada query pagava ~20-90ms de rede.
#   Migracao de dados (uma vez): scripts/migrate-neon-to-droplet.sh
#   Backup (substitui o gerenciado do Neon): scripts/backup-db.sh + cron.
# - Variaveis sensiveis vem do arquivo .env no servidor
# =====================================================

services:
  # Postgres local — exposto SOMENTE na rede interna do compose (sem `ports`),
  # nunca na internet. A API conecta via host `postgres` na rede `g360`.
  postgres:
    # PG 17 para casar com a origem (Neon roda PostgreSQL 17.x). O servidor local
    # precisa ser >= a versao do dump de origem.
    image: postgres:17-alpine
    container_name: g360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-g360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-g360}
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - g360
    expose:
      - "5432"
    volumes:
      - g360_pgdata:/var/lib/postgresql/data
    # Evita "could not resize shared memory" em queries paralelas/joins grandes.
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-g360} -d ${POSTGRES_DB:-g360} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: g360-api:latest
    container_name: g360-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3333"
      API_PREFIX: api
    networks:
      - g360
    expose:
      - "3333"
    depends_on:
      # Garante que o `prisma migrate deploy` do boot so rode com o banco pronto.
      postgres:
        condition: service_healthy
    volumes:
      # Persiste os arquivos binarios controlados do GED (DOCX/PDF), inclusive
      # os salvos pelo editor online Collabora. Sem isso, um rebuild perde os
      # arquivos que so existem em disco (contentText nulo).
      - g360_storage:/app/apps/api/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* precisa estar no build (Next inlina)
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://gestao360.org}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-5564981009108}
        NEXT_PUBLIC_APP_NAME: "Gestão 360"
    image: g360-web:latest
    container_name: g360-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://gestao360.org}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-5564981009108}
      INDEXNOW_ENABLED: ${INDEXNOW_ENABLED:-0}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
    networks:
      - g360
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Collabora Online (CODE) — editor DOCX online via protocolo WOPI.
  # O host WOPI e a propria API (rotas /api/wopi). O Caddy publica este
  # servico no subdominio collabora.gestao360.org (ver Caddyfile).
  collabora:
    image: collabora/code:latest
    container_name: g360-collabora
    # Collabora habilitado como servico PADRAO do deploy (DNS collabora.gestao360.org
    # ativo + cert emitido). Sem 'profiles' para que o deploy.sh (up -d --remove-orphans)
    # NAO o trate como orfao e o preserve/gerencie a cada deploy.
    restart: unless-stopped
    environment:
      # Dominios (regex) autorizados a embutir/usar o editor = host WOPI.
      # Precisa bater com DOCUMENT_EDITOR_WOPI_BASE (https://gestao360.org/api).
      aliasgroup1: https://gestao360.org:443
      # SSL e terminado no Caddy; o Collabora confia no proxy.
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.proto=IPv4 --o:logging.level=warning
      # Console administrativo do Collabora (https://collabora.gestao360.org/browser/dist/admin/admin.html)
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD:-troque-no-.env}
      DONT_GEN_SSL_CERT: "true"
    # CODE precisa de MKNOD para criar os jails de cada documento.
    cap_add:
      - MKNOD
    tty: true
    networks:
      - g360
    expose:
      - "9980"
    healthcheck:
      # A imagem do Collabora nao tem curl/wget; usa bash /dev/tcp p/ checar a porta.
      # start_period alto: o 1o boot clona os jails (systemplate) e demora ~2-3min.
      test: ["CMD-SHELL", "bash -c '(exec 3<>/dev/tcp/127.0.0.1/9980)' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: g360-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - g360
    depends_on:
      - api
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  g360:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  g360_storage:
  g360_pgdata:
